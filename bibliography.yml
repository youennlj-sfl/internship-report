cra-article:
  type: article
  title: 'Fostering Cyber Resilience in Europe: An In-Depth Exploration of the Cyber Resilience Act'
  author:
  - Schmittner, Christoph
  - Veledar, Omar
  - Faschang, Thomas
  - Macher, Georg
  - Brenner, Eugen
  date: 2024
  editor:
  - Yilmaz, Murat
  - Clarke, Paul
  - Riel, Andreas
  - Messnarz, Richard
  - Greiner, Christian
  - Peisl, Thomas
  page-range: 390-404
  serial-number:
    isbn: 978-3-031-71139-8
  abstract: The proliferation of Internet of Things (IoT) devices in our hyperconnected world has undoubtedly improved efficiency and convenience but has also heightened vulnerabilities. The pervasive connectivity has exponentially increased the likelihood of data breaches and network intrusions, with cyberattacks becoming more frequent, sophisticated, and impactful. This digital transformation spans across sectors, exposing critical infrastructure to significant cyber risks with potentially catastrophic consequences. Against this backdrop, robust cybersecurity measures are imperative. The EU's Cyber Resilience Act (CRA) represents a proactive response to the evolving cyber threat landscape, aiming to enhance cybersecurity resilience and promote trust in the digital economy. This paper provides an overview of global cybersecurity regulations, delves into the specifics of the CRA, examines its integration into the existing CE marking scheme, and discusses its potential impact on innovation. By addressing multifaceted challenges posed by cyber threats, the CRA holds the promise of safeguarding digital infrastructure and fostering a resilient digital society.
  parent:
    type: proceedings
    title: Systems, Software and Services Process Improvement
    publisher:
      name: Springer Nature Switzerland
      location: Cham

